<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found - Ecstasy</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #000;
      color: #fff;
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .container {
      max-width: 500px;
      padding: 2rem;
    }
    .cassette {
      width: 100px;
      height: 60px;
      background-color: #000;
      border: 2px solid #ff69b4;
      border-radius: 5px;
      margin: 0 auto 2rem;
      position: relative;
      padding: 10px;
    }
    .reels {
      display: flex;
      justify-content: space-between;
    }
    .reel {
      width: 20px;
      height: 20px;
      border: 1px solid #5d8bf4;
      border-radius: 50%;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
      color: #ff69b4;
    }
    p {
      margin-bottom: 2rem;
      color: #aaa;
    }
    .button {
      display: inline-block;
      background-color: #ff69b4;
      color: #000;
      padding: 0.75rem 1.5rem;
      border-radius: 0.25rem;
      text-decoration: none;
      font-weight: bold;
      transition: background-color 0.2s;
    }
    .button:hover {
      background-color: #ff69b4cc;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="cassette">
      <div class="reels">
        <div class="reel"></div>
        <div class="reel"></div>
      </div>
    </div>
    <h1>404 - Page Not Found</h1>
    <p>The mixtape you're looking for seems to be missing. It might have been rewound too far.</p>
    <a href="/" class="button">Back to Home</a>
  </div>
  <script>
    // Redirect to home page after 5 seconds
    setTimeout(() => {
      window.location.href = '/';
    }, 5000);
  </script>
</body>
</html>
